  vector_weights:
    - 1.0
    - 1.0
    - 1.0
    - 1.0
    - 2.5    # opposition (most important)
    - 2.0    # redundant thumb
    - 1.5
    - 1.5
    - 1.5
    - 1.5
    - 1.5
    - 1.0
    - 1.0
    - 0.8    # fingertip direction
    - 1.0
