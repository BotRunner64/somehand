# Retargeting config: MediaPipe -> Linkerhand L20 Right Hand
#
# The palm-base vectors, pinch loss, and thumb position constraints were making
# the optimizer fight itself on recorded PICO data. This version now keeps the
# informative non-palm vectors but matches them with vector residuals (like
# dex-retargeting) instead of direction-only cosine loss, which makes distal
# joints much more observable.

hand:
  name: "linkerhand_l20_right"
  side: "right"
  mjcf_path: "../../../assets/mjcf/linkerhand_l20_right/model.xml"

retargeting:
  type: "vector"

  human_vector_pairs:
    # Thumb
    - [0, 4]
    - [1, 4]
    - [1, 2]
    - [1, 3]
    - [2, 3]
    - [2, 4]
    - [3, 4]
    # Index
    - [5, 6]
    - [6, 8]
    - [7, 8]
    # Middle
    - [9, 10]
    - [10, 12]
    - [11, 12]
    # Ring
    - [13, 14]
    - [14, 16]
    - [15, 16]
    # Little
    - [17, 18]
    - [18, 20]
    - [19, 20]

  origin_link_names:
    - "world"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals_base1"
    - "thumb_metacarpals"
    - "thumb_metacarpals"
    - "thumb_distal"
    - "index_metacarpals"
    - "index_proximal"
    - "index_distal"
    - "middle_metacarpals"
    - "middle_proximal"
    - "middle_distal"
    - "ring_metacarpals"
    - "ring_proximal"
    - "ring_distal"
    - "pinky_metacarpals"
    - "pinky_proximal"
    - "pinky_distal"

  task_link_names:
    - "thumb_distal_tip"
    - "thumb_distal_tip"
    - "thumb_metacarpals"
    - "thumb_proximal"
    - "thumb_proximal"
    - "thumb_distal_tip"
    - "thumb_distal_tip"
    - "index_middle"
    - "index_distal_tip"
    - "index_distal_tip"
    - "middle_middle"
    - "middle_distal_tip"
    - "middle_distal_tip"
    - "ring_middle"
    - "ring_distal_tip"
    - "ring_distal_tip"
    - "pinky_middle"
    - "pinky_distal_tip"
    - "pinky_distal_tip"

  origin_link_types:
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"
    - "body"

  task_link_types:
    - "site"
    - "site"
    - "body"
    - "body"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"
    - "body"
    - "site"
    - "site"

  vector_weights:
    - 2.2
    - 1.8
    - 1.2
    - 1.2
    - 1.2
    - 1.4
    - 1.4
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8
    - 1.0
    - 1.0
    - 0.8

  vector_loss:
    type: "residual"
    huber_delta: 0.02
    scaling: 1.0
    scale_landmarks: [0, 9]
    scale_bodies: ["world", "middle_proximal"]
    scale_body_types: ["body", "body"]

  angle_constraints:
    - landmarks: [4, 0, 8]
      joint: "thumb_cmc_yaw"
      weight: 1.0
      scale: 1.0
    - landmarks: [1, 2, 3]
      joint: "thumb_mcp"
      weight: 1.4
      scale: 2.0
    - landmarks: [2, 3, 4]
      joint: "thumb_dip"
      weight: 1.4
      scale: 2.0
    - landmarks: [5, 6, 7]
      joint: "index_pip"
      weight: 1.2
      scale: 1.4
    - landmarks: [6, 7, 8]
      joint: "index_dip"
      weight: 2.0
      scale: 2.4
    - landmarks: [9, 10, 11]
      joint: "middle_pip"
      weight: 1.2
      scale: 1.4
    - landmarks: [10, 11, 12]
      joint: "middle_dip"
      weight: 2.0
      scale: 2.4
    - landmarks: [13, 14, 15]
      joint: "ring_pip"
      weight: 1.2
      scale: 1.4
    - landmarks: [14, 15, 16]
      joint: "ring_dip"
      weight: 2.0
      scale: 2.4
    - landmarks: [17, 18, 19]
      joint: "pinky_pip"
      weight: 1.2
      scale: 1.4
    - landmarks: [18, 19, 20]
      joint: "pinky_dip"
      weight: 2.0
      scale: 2.4

  preprocess:
    temporal_filter_alpha: 0.50

  solver:
    max_iterations: 60
    norm_delta: 0.004
    output_alpha: 0.80
